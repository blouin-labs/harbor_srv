[libdefaults]
    default_realm = HARBOR.LOCAL
    dns_lookup_realm = false
    dns_lookup_kdc = false
    ticket_lifetime = 24h
    renew_lifetime = 7d
    # Ticket forwarding disabled — not needed for NFS-only use; reduces blast radius
    # if a network service is compromised.
    forwardable = false

[realms]
    HARBOR.LOCAL = {
        kdc = localhost
        admin_server = localhost
    }

[domain_realm]
    .harbor.local = HARBOR.LOCAL
    harbor.local = HARBOR.LOCAL

[logging]
    kdc = SYSLOG:NOTICE
    admin_server = SYSLOG:NOTICE
    default = SYSLOG:NOTICE
