---
name: Set up deploy environment
description: Installs deploy tools and configures SSH access to harbor-srv.

inputs:
  ssh-key:
    description: Private key for gh-deploy@harbor-srv (GH_DEPLOY_SSH_KEY)
    required: true

runs:
  using: composite
  steps:
    - name: Install tools
      shell: bash
      run: apt-get update -qq && apt-get install -y -qq curl jq unzip openssh-client

    - name: Configure SSH
      shell: bash
      env:
        SSH_KEY: ${{ inputs.ssh-key }}
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        printf '%s\n' "$SSH_KEY" > ~/.ssh/gh-deploy-ssh-key
        chmod 600 ~/.ssh/gh-deploy-ssh-key
        printf 'Host harbor-srv\n  HostName 192.168.1.5\n  User gh-deploy\n  IdentityFile ~/.ssh/gh-deploy-ssh-key\n  StrictHostKeyChecking accept-new\n' > ~/.ssh/config
