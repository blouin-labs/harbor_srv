---
name: Checks

on:
  pull_request:
    branches: [staging]
    paths:
      - 'profile/**'
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      scripts: ${{ steps.filter.outputs.scripts }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            scripts:
              - 'profile/**'
              - 'scripts/**'
            workflows:
              - '.github/workflows/**'

  select-runner:
    uses: ./.github/workflows/select-runner.yml
    secrets: inherit

  shellcheck:
    needs: [changes, select-runner]
    if: ${{ needs.changes.outputs.scripts == 'true' }}
    runs-on: ${{ fromJSON(needs.select-runner.outputs.runner) }}
    container:
      # archlinux/archlinux:latest — pinned digest matches ARCH_SNAPSHOT in build.yml
      image: archlinux/archlinux@sha256:0e2b66488c60a96c65041cde5e754957a880b760dd4f00865ed09c131a51cd44
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: |
          pacman -Sy --needed --noconfirm archlinux-keyring
          pacman --noconfirm -Syu --needed shellcheck

      - name: Shellcheck
        run: |
          shellcheck profile/profiledef.sh
          shellcheck scripts/build-image.sh
          shellcheck scripts/install.sh
          shellcheck scripts/deploy.sh
          shellcheck profile/airootfs/usr/local/bin/harbor-runner-bootstrap
          shellcheck profile/airootfs/usr/local/sbin/harbor-deploy

  actionlint:
    needs: changes
    if: ${{ needs.changes.outputs.workflows == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install actionlint
        run: |
          curl -sL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          sudo mv actionlint /usr/local/bin/

      - name: Actionlint
        run: actionlint
