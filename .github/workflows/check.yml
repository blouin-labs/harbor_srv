---
name: Checks

on:
  pull_request:
    branches: [staging]
    paths:
      - 'profile/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - '**.md'
      - '.vale.ini'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      scripts: ${{ steps.filter.outputs.scripts }}
      workflows: ${{ steps.filter.outputs.workflows }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            scripts:
              - 'profile/**'
              - 'scripts/**'
            workflows:
              - '.github/workflows/**'
            docs:
              - '**.md'
              - '.vale.ini'

  shellcheck:
    needs: changes
    if: ${{ needs.changes.outputs.scripts == 'true' }}
    # Runs in a container: job (no nested Docker needed), so any self-hosted runner works.
    # See blouin-labs/issues#63 for the DinD /proc restriction context.
    runs-on: [self-hosted]
    container:
      image: ubuntu:latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: apt-get update -qq && apt-get install -y shellcheck

      - name: Shellcheck
        run: find . -name "*.sh" -exec shellcheck {} +

  actionlint:
    needs: changes
    if: ${{ needs.changes.outputs.workflows == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install actionlint
        run: |
          curl -sL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          sudo mv actionlint /usr/local/bin/

      - name: Actionlint
        run: actionlint

  vale:
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Vale crashes (exit 2) on dangling symlinks — vale-cli/vale#919.
      # The repo contains absolute symlinks in systemd .wants/ directories
      # that resolve on the deployed system but not on the runner.
      - name: Remove dangling symlinks
        run: find . -xtype l -delete

      - uses: vale-cli/vale-action@v2.1.1
        with:
          files: "."
          reporter: github-check
          fail_on_error: true
          level: warning

  all-checks:
    needs: [shellcheck, actionlint, vale]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: |
          if [ "${{ needs.shellcheck.result }}" = "failure" ] \
            || [ "${{ needs.actionlint.result }}" = "failure" ] \
            || [ "${{ needs.vale.result }}" = "failure" ]; then
            exit 1
          fi
