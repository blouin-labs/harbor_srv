---
name: Build

# Package versions are pinned by the date in ./arch-snapshot.
# The build container is intentionally unpinned — see README.md "Updating the stack".

on:
  push:
    branches: [staging]
    paths:
      - 'arch-snapshot'
      - 'profile/**'
      - 'scripts/**'

jobs:
  select-runner:
    uses: ./.github/workflows/select-runner.yml
    secrets: inherit

  build:
    runs-on: ${{ fromJSON(needs.select-runner.outputs.runner) }}
    needs: select-runner
    container:
      # Intentionally unpinned — build tools (pacstrap, e2fsprogs, zstd) are
      # updated via pacman -Syu each run. Output reproducibility is provided by ARCH_SNAPSHOT alone.
      image: archlinux/archlinux:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v5

      - name: Read arch snapshot
        run: echo "ARCH_SNAPSHOT=$(cat arch-snapshot)" >> "$GITHUB_ENV"

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          pacman -Sy --needed --noconfirm archlinux-keyring
          pacman -Syu --needed --noconfirm arch-install-scripts e2fsprogs dosfstools zstd

      - name: Build root image
        run: ./scripts/build-image.sh profile/ output/

      - name: Upload root image artifact
        uses: actions/upload-artifact@v6
        with:
          name: harbor_srv-root-${{ steps.sha.outputs.short }}
          path: output/harbor_srv-root.img.zst*
          retention-days: 30

      - name: Upload pacman DB artifact
        uses: actions/upload-artifact@v6
        with:
          name: harbor_srv-pacman-db-${{ steps.sha.outputs.short }}
          path: output/pacman-db-local.tar.gz
          retention-days: 90

      - name: Write build summary
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          | Field | Value |
          |---|---|
          | Commit | \`${{ github.sha }}\` |
          | Message | ${COMMIT_MSG} |
          | Branch | \`${{ github.ref_name }}\` |
          | Arch snapshot | \`${{ env.ARCH_SNAPSHOT }}\` |
          | Built at | \`$(date -u)\` |
          EOF
