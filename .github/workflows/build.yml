---
name: Build

on:
  push:
    branches: [test]
    paths:
      - 'profile/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - '!**/README.md'
  pull_request:
    branches: [main]
    paths:
      - 'profile/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - '!**/README.md'

jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: |
          pacman -Sy --needed --noconfirm archlinux-keyring
          pacman --noconfirm -Syu --needed shellcheck

      - name: Shellcheck
        run: |
          shellcheck profile/profiledef.sh
          shellcheck scripts/build-image.sh
          shellcheck scripts/install.sh
          shellcheck scripts/deploy.sh

  build:
    runs-on: ubuntu-latest
    needs: check
    container:
      image: archlinux/archlinux:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          pacman -Sy --needed --noconfirm archlinux-keyring
          pacman -Syu --needed --noconfirm arch-install-scripts e2fsprogs dosfstools zstd

      - name: Build root image
        run: ./scripts/build-image.sh profile/ output/

      - name: Upload root image artifact
        uses: actions/upload-artifact@v5
        with:
          name: harbor_srv-root
          path: output/
          retention-days: 30
