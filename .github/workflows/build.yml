---
name: Build

# Snapshot date and Docker image digest are pinned together.
# To upgrade the full stack, update both values here and open a PR.
# See README.md "Updating the stack" for the full process.
env:
  ARCH_SNAPSHOT: "2026/03/22"  # archive.archlinux.org date — update to upgrade

on:
  push:
    branches: [test, main]
    paths:
      - 'profile/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - '!**/README.md'
  pull_request:
    branches: [test]
    paths:
      - 'profile/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - '!**/README.md'

jobs:
  select-runner:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      - name: Pick runner
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(gh api repos/${{ github.repository }}/actions/runners \
            --jq '.runners[] | select(.name=="harbor-srv") | .status' 2>/dev/null || echo "")
          if [ "$STATUS" = "online" ]; then
            echo 'runner=["self-hosted","harbor-srv"]' >> "$GITHUB_OUTPUT"
          else
            echo 'runner=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          fi

  check:
    runs-on: ${{ fromJSON(needs.select-runner.outputs.runner) }}
    needs: select-runner
    container:
      # archlinux/archlinux:latest — pinned digest matches ARCH_SNAPSHOT above
      image: archlinux/archlinux@sha256:0e2b66488c60a96c65041cde5e754957a880b760dd4f00865ed09c131a51cd44
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: |
          pacman -Sy --needed --noconfirm archlinux-keyring
          pacman --noconfirm -Syu --needed shellcheck

      - name: Shellcheck
        run: |
          shellcheck profile/profiledef.sh
          shellcheck scripts/build-image.sh
          shellcheck scripts/install.sh
          shellcheck scripts/deploy.sh
          shellcheck profile/airootfs/usr/local/bin/harbor-runner-bootstrap
          shellcheck profile/airootfs/usr/local/sbin/harbor-deploy

  build:
    runs-on: ${{ fromJSON(needs.select-runner.outputs.runner) }}
    needs: [check, select-runner]
    container:
      # archlinux/archlinux:latest — pinned digest matches ARCH_SNAPSHOT above
      image: archlinux/archlinux@sha256:0e2b66488c60a96c65041cde5e754957a880b760dd4f00865ed09c131a51cd44
      options: --privileged
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          pacman -Sy --needed --noconfirm archlinux-keyring
          pacman -Syu --needed --noconfirm arch-install-scripts e2fsprogs dosfstools zstd

      - name: Build root image
        run: ./scripts/build-image.sh profile/ output/

      - name: Upload root image artifact
        uses: actions/upload-artifact@v6
        with:
          name: harbor_srv-root
          path: output/
          retention-days: 30

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: [self-hosted, harbor-srv]
    steps:
      - name: Download root image
        uses: actions/download-artifact@v6
        with:
          name: harbor_srv-root
          path: /tmp/harbor-deploy/

      - name: Deploy
        run: |
          mv /tmp/harbor-deploy/harbor_srv-root.img.zst /tmp/harbor_srv-root.img.zst
          sudo /usr/local/sbin/harbor-deploy
