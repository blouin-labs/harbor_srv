---
name: Promotion

on:
  workflow_dispatch:
    inputs:
      action:
        description: Action to perform
        required: true
        type: choice
        default: promote-and-deploy
        options:
          - promote-and-deploy
          - promote
          - deploy
      confirm:
        description: 'For promote-and-deploy or deploy: type "ok reboot" to confirm. Server will reboot.'
        required: false
      run_id:
        description: 'Deploy only: build run ID to deploy (leave blank for latest successful staging build)'
        required: false

permissions:
  contents: write
  actions: write

jobs:
  promote:
    runs-on: ubuntu-latest
    if: ${{ inputs.action == 'promote' || inputs.action == 'promote-and-deploy' }}
    outputs:
      run_id: ${{ steps.verify.outputs.run_id }}
    steps:
      - name: Confirm
        if: ${{ inputs.action == 'promote-and-deploy' }}
        run: |
          if [ "${{ inputs.confirm }}" != "ok reboot" ]; then
            echo "ERROR: type exactly 'ok reboot' to confirm." >&2
            exit 1
          fi

      - name: Verify staging build
        id: verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/build.yml/runs?branch=staging&status=success&per_page=1" \
            --jq '.workflow_runs[0].id')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "ERROR: no successful CI build found on staging" >&2
            exit 1
          fi
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Fast-forward main to staging
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api "repos/${{ github.repository }}/git/refs/heads/staging" \
            --jq '.object.sha')
          gh api "repos/${{ github.repository }}/git/refs/heads/main" \
            --method PATCH \
            --field sha="$SHA" \
            --field force=false

  download:
    needs: [promote]
    runs-on: [self-hosted, harbor-srv-docker]
    container: ubuntu:latest
    if: ${{ always() && (inputs.action == 'promote-and-deploy' || inputs.action == 'deploy') }}
    steps:
      - name: Set up environment
        env:
          GH_DEPLOY_SSH_KEY: ${{ secrets.GH_DEPLOY_SSH_KEY }}
        run: |
          apt-get update -qq && apt-get install -y -qq curl jq unzip openssh-client
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$GH_DEPLOY_SSH_KEY" > ~/.ssh/gh-deploy-ssh-key
          chmod 600 ~/.ssh/gh-deploy-ssh-key
          printf 'Host harbor-srv\n  HostName 192.168.1.5\n  User gh-deploy\n  IdentityFile ~/.ssh/gh-deploy-ssh-key\n  StrictHostKeyChecking accept-new\n' > ~/.ssh/config

      - name: Confirm
        run: |
          if [ "${{ inputs.confirm }}" != "ok reboot" ]; then
            echo "ERROR: type exactly 'ok reboot' to confirm." >&2
            exit 1
          fi

      - name: Resolve artifact
        id: artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ inputs.run_id }}"
          if [ -z "$RUN_ID" ]; then
            RUN_ID="${{ needs.promote.outputs.run_id }}"
          fi
          if [ -z "$RUN_ID" ]; then
            RUN_ID=$(curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/runs?branch=staging&status=success&per_page=1" \
              | jq -r '.workflow_runs[0].id')
          fi
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "ERROR: could not resolve a build artifact to deploy" >&2
            exit 1
          fi
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Download root image artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_URL=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ steps.artifact.outputs.run_id }}/artifacts" \
            | jq -r '.artifacts[] | select(.name | startswith("harbor_srv-root")) | .archive_download_url')
          rm -rf /tmp/harbor-deploy/
          mkdir -p /tmp/harbor-deploy/
          curl -sL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -o /tmp/harbor-deploy/artifact.zip \
            "$ARTIFACT_URL"
          unzip -q /tmp/harbor-deploy/artifact.zip -d /tmp/harbor-deploy/
          rm /tmp/harbor-deploy/artifact.zip

      - name: Transfer image to harbor-srv
        # harbor-deploy.sh reads the image from /tmp/harbor_srv-root.img.zst.
        run: scp /tmp/harbor-deploy/harbor_srv-root.img.zst harbor-srv:/tmp/harbor_srv-root.img.zst

  flash:
    needs: [download]
    runs-on: [self-hosted, harbor-srv-docker]
    container: ubuntu:latest
    if: ${{ always() && needs.download.result == 'success' }}
    outputs:
      target_label: ${{ steps.target.outputs.target_label }}
    steps:
      - name: Set up environment
        env:
          GH_DEPLOY_SSH_KEY: ${{ secrets.GH_DEPLOY_SSH_KEY }}
        run: |
          apt-get update -qq && apt-get install -y -qq curl jq openssh-client
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$GH_DEPLOY_SSH_KEY" > ~/.ssh/gh-deploy-ssh-key
          chmod 600 ~/.ssh/gh-deploy-ssh-key
          printf 'Host harbor-srv\n  HostName 192.168.1.5\n  User gh-deploy\n  IdentityFile ~/.ssh/gh-deploy-ssh-key\n  StrictHostKeyChecking accept-new\n' > ~/.ssh/config

      - name: Determine target partition
        id: target
        run: |
          LABEL=$(ssh harbor-srv \
            'source /etc/harbor/partitions.conf
             ACTIVE=$(findmnt -n -o SOURCE /)
             if [ "$ACTIVE" = "$ROOT_A_DEV" ]; then echo "Root B"; else echo "Root A"; fi')
          echo "target_label=${LABEL}" >> "$GITHUB_OUTPUT"

      - name: Upload deploy script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/profile/airootfs/usr/local/sbin/harbor-deploy.sh?ref=${{ github.sha }}" \
            | jq -r '.content' | base64 -d > /tmp/harbor-deploy-staged.sh
          if [ ! -s /tmp/harbor-deploy-staged.sh ]; then
            echo "ERROR: failed to fetch harbor-deploy.sh from API" >&2
            exit 1
          fi
          scp /tmp/harbor-deploy-staged.sh harbor-srv:/var/lib/gh-deploy/harbor-deploy-staged.sh
          ssh harbor-srv chmod +x /var/lib/gh-deploy/harbor-deploy-staged.sh
          rm -f /tmp/harbor-deploy-staged.sh

      - name: Stage secrets
        env:
          KRB5_SECRETS_B64: ${{ secrets.KRB5_SECRETS_B64 }}
          RUNNER_REG_APP_KEY: ${{ secrets.RUNNER_REG_APP_KEY }}
          RUNNER_REG_APP_ID: ${{ vars.RUNNER_REG_APP_ID }}
          GH_DEPLOY_SSH_KEY: ${{ secrets.GH_DEPLOY_SSH_KEY }}
          GHIO_PULLER_PAT: ${{ secrets.GHIO_PULLER_PAT }}
          HARBOR_BOOT_REPORTER_KEY: ${{ secrets.HARBOR_BOOT_REPORTER_KEY }}
          HARBOR_BOOT_REPORTER_APP_ID: ${{ vars.HARBOR_BOOT_REPORTER_APP_ID }}
        run: |
          ssh harbor-srv 'umask 077; mkdir -p /var/lib/gh-deploy/harbor-deploy'
          printf '%s' "$KRB5_SECRETS_B64"          | ssh harbor-srv 'umask 077; cat > /var/lib/gh-deploy/harbor-deploy/krb5-secrets-b64'
          printf '%s' "$RUNNER_REG_APP_KEY"         | ssh harbor-srv 'umask 077; cat > /var/lib/gh-deploy/harbor-deploy/runner-reg-app-key'
          printf '%s' "$RUNNER_REG_APP_ID"          | ssh harbor-srv 'umask 077; cat > /var/lib/gh-deploy/harbor-deploy/runner-reg-app-id'
          printf '%s' "$GH_DEPLOY_SSH_KEY"          | ssh harbor-srv 'umask 077; cat > /var/lib/gh-deploy/harbor-deploy/gh-deploy-ssh-key'
          printf '%s' "$GHIO_PULLER_PAT"            | ssh harbor-srv 'umask 077; cat > /var/lib/gh-deploy/harbor-deploy/ghio-puller-pat'
          printf '%s' "${{ github.run_id }}"        | ssh harbor-srv 'umask 077; cat > /var/lib/gh-deploy/harbor-deploy/deploy-run-id'
          printf '%s' "$HARBOR_BOOT_REPORTER_KEY"   | ssh harbor-srv 'umask 077; cat > /var/lib/gh-deploy/harbor-deploy/harbor-boot-reporter-key'
          printf '%s' "$HARBOR_BOOT_REPORTER_APP_ID" | ssh harbor-srv 'umask 077; cat > /var/lib/gh-deploy/harbor-deploy/harbor-boot-reporter-app-id'

      - name: Flash server
        run: |
          if ssh harbor-srv sudo -n -l /var/lib/gh-deploy/harbor-deploy-staged.sh >/dev/null 2>&1; then
            echo ":: Running CI-staged deploy script"
            ssh harbor-srv sudo /var/lib/gh-deploy/harbor-deploy-staged.sh
          else
            echo ":: Sudoers not yet updated — falling back to on-disk script"
            ssh harbor-srv sudo /usr/local/sbin/harbor-deploy.sh
          fi

  verify:
    needs: [flash]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ always() && needs.flash.result != 'cancelled' && needs.flash.result != 'skipped' }}
    steps:
      - name: Verify root partition
        env:
          HARBOR_BOOT_REPORTER_KEY: ${{ secrets.HARBOR_BOOT_REPORTER_KEY }}
          HARBOR_BOOT_REPORTER_APP_ID: ${{ vars.HARBOR_BOOT_REPORTER_APP_ID }}
        run: |
          EXPECTED="${{ needs.flash.outputs.target_label }}"
          RUN_ID="${{ github.run_id }}"

          KEY_FILE=$(mktemp)
          printf '%s' "$HARBOR_BOOT_REPORTER_KEY" > "$KEY_FILE"
          NOW=$(date +%s)
          HEADER=$(printf '{"alg":"RS256","typ":"JWT"}' | base64 -w0 | tr '+/' '-_' | tr -d '=')
          PAYLOAD=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' $((NOW - 60)) $((NOW + 600)) "$HARBOR_BOOT_REPORTER_APP_ID" \
                    | base64 -w0 | tr '+/' '-_' | tr -d '=')
          SIG=$(printf '%s.%s' "$HEADER" "$PAYLOAD" \
                | openssl dgst -sha256 -sign "$KEY_FILE" \
                | base64 -w0 | tr '+/' '-_' | tr -d '=')
          JWT="${HEADER}.${PAYLOAD}.${SIG}"
          rm -f "$KEY_FILE"

          INSTALL_ID=$(curl -sf \
            -H "Authorization: Bearer $JWT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/installation" | jq -r '.id')
          TOKEN=$(curl -sf \
            -X POST \
            -H "Authorization: Bearer $JWT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/app/installations/${INSTALL_ID}/access_tokens" | jq -r '.token')

          echo "Polling HARBOR_BOOT_LAST for run ${RUN_ID}..."
          RESULT=""
          for _ in $(seq 1 120); do
            RESULT=$(curl -sf \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/variables/HARBOR_BOOT_LAST" \
              | jq -r '.value' 2>/dev/null || echo "")
            RESULT_RUN="${RESULT%%:*}"
            if [ "$RESULT_RUN" = "$RUN_ID" ]; then break; fi
            sleep 5
          done

          RESULT_RUN="${RESULT%%:*}"
          if [ "$RESULT_RUN" != "$RUN_ID" ]; then
            echo "ERROR: timed out waiting for post-boot result" >&2
            exit 1
          fi

          ACTUAL="${RESULT#*:}"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "ERROR: running on '${ACTUAL}', expected '${EXPECTED}'" >&2
            exit 1
          fi
          echo "Verified: server is running on ${ACTUAL}"
