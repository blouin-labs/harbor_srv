---
name: Promotion

on:
  workflow_dispatch:
    inputs:
      action:
        description: Action to perform
        required: true
        type: choice
        default: promote-and-deploy
        options:
          - promote-and-deploy
          - promote
          - deploy
      confirm:
        description: 'For promote-and-deploy or deploy: type "ok reboot" to confirm. Server will reboot.'
        required: false
      run_id:
        description: 'Deploy only: build run ID to deploy (leave blank for latest successful staging build)'
        required: false

permissions:
  contents: write
  actions: write

jobs:
  promote:
    runs-on: ubuntu-latest
    if: ${{ inputs.action == 'promote' || inputs.action == 'promote-and-deploy' }}
    outputs:
      run_id: ${{ steps.verify.outputs.run_id }}
    steps:
      - name: Confirm
        if: ${{ inputs.action == 'promote-and-deploy' }}
        run: |
          if [ "${{ inputs.confirm }}" != "ok reboot" ]; then
            echo "ERROR: type exactly 'ok reboot' to confirm." >&2
            exit 1
          fi

      - name: Verify staging build
        id: verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/build.yml/runs?branch=staging&status=success&per_page=1" \
            --jq '.workflow_runs[0].id')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "ERROR: no successful CI build found on staging" >&2
            exit 1
          fi
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Fast-forward main to staging
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api "repos/${{ github.repository }}/git/refs/heads/staging" \
            --jq '.object.sha')
          gh api "repos/${{ github.repository }}/git/refs/heads/main" \
            --method PATCH \
            --field sha="$SHA" \
            --field force=false

  download:
    needs: [promote]
    runs-on: [self-hosted, harbor-srv-docker]
    if: ${{ always() && (inputs.action == 'promote-and-deploy' || inputs.action == 'deploy') }}
    steps:
      - name: Confirm
        run: |
          if [ "${{ inputs.confirm }}" != "ok reboot" ]; then
            echo "ERROR: type exactly 'ok reboot' to confirm." >&2
            exit 1
          fi

      - name: Resolve artifact
        id: artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ inputs.run_id }}"
          if [ -z "$RUN_ID" ]; then
            RUN_ID="${{ needs.promote.outputs.run_id }}"
          fi
          if [ -z "$RUN_ID" ]; then
            RUN_ID=$(curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/runs?branch=staging&status=success&per_page=1" \
              | jq -r '.workflow_runs[0].id')
          fi
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "ERROR: could not resolve a build artifact to deploy" >&2
            exit 1
          fi
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Download root image artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_URL=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ steps.artifact.outputs.run_id }}/artifacts" \
            | jq -r '.artifacts[] | select(.name | startswith("harbor_srv-root")) | .archive_download_url')
          rm -rf /tmp/harbor-deploy/
          mkdir -p /tmp/harbor-deploy/
          curl -sL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -o /tmp/harbor-deploy/artifact.zip \
            "$ARTIFACT_URL"
          unzip -q /tmp/harbor-deploy/artifact.zip -d /tmp/harbor-deploy/
          rm /tmp/harbor-deploy/artifact.zip

      - name: Transfer image to harbor-srv
        # SSH config in the runner container maps "harbor-srv" → gh-deploy@192.168.1.5.
        # harbor-deploy.sh reads the image from /tmp/harbor_srv-root.img.zst.
        run: scp /tmp/harbor-deploy/harbor_srv-root.img.zst harbor-srv:/tmp/harbor_srv-root.img.zst

  flash:
    needs: [download]
    runs-on: [self-hosted, harbor-srv-docker]
    if: ${{ always() && needs.download.result == 'success' }}
    steps:
      - name: Stage secrets
        env:
          KRB5_SECRETS_B64: ${{ secrets.KRB5_SECRETS_B64 }}
          RUNNER_REG_APP_KEY: ${{ secrets.RUNNER_REG_APP_KEY }}
          RUNNER_REG_APP_ID: ${{ vars.RUNNER_REG_APP_ID }}
          GH_DEPLOY_SSH_KEY: ${{ secrets.GH_DEPLOY_SSH_KEY }}
          GHIO_PULLER_PAT: ${{ secrets.GHIO_PULLER_PAT }}
        run: |
          ssh harbor-srv 'umask 077; mkdir -p /var/lib/gh-deploy/harbor-deploy'
          printf '%s' "$KRB5_SECRETS_B64"   | ssh harbor-srv 'umask 077; cat > /var/lib/gh-deploy/harbor-deploy/krb5-secrets.b64'
          printf '%s' "$RUNNER_REG_APP_KEY" | ssh harbor-srv 'umask 077; cat > /var/lib/gh-deploy/harbor-deploy/runner-reg-key.pem'
          printf '%s' "$RUNNER_REG_APP_ID"  | ssh harbor-srv 'umask 077; cat > /var/lib/gh-deploy/harbor-deploy/runner-reg-app-id'
          printf '%s' "$GH_DEPLOY_SSH_KEY"  | ssh harbor-srv 'umask 077; cat > /var/lib/gh-deploy/harbor-deploy/gh-deploy-key'
          printf '%s' "$GHIO_PULLER_PAT"    | ssh harbor-srv 'umask 077; cat > /var/lib/gh-deploy/harbor-deploy/ghio-puller-pat'

      - name: Flash server
        run: ssh harbor-srv sudo /usr/local/sbin/harbor-deploy.sh

  verify:
    needs: [flash]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.flash.result != 'cancelled' && needs.flash.result != 'skipped' }}
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RUNNER_POLLER_APP_ID }}
          private-key: ${{ secrets.RUNNER_POLLER_APP_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Wait for harbor-srv-docker to reboot and reconnect
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          OFFLINE_TIMEOUT=90
          ONLINE_TIMEOUT=300
          POLL=10

          echo "Phase 1: waiting for harbor-srv-docker to go offline (reboot started)..."
          elapsed=0
          status=""
          while [ "$elapsed" -lt "$OFFLINE_TIMEOUT" ]; do
            status=$(gh api "repos/${{ github.repository }}/actions/runners" \
              --jq '.runners[] | select(.name == "harbor-srv-docker") | .status')
            [ "$status" = "offline" ] && break
            echo "  status=${status:-not found}, elapsed=${elapsed}s"
            sleep "$POLL"
            elapsed=$((elapsed + POLL))
          done
          if [ "$status" != "offline" ]; then
            echo "ERROR: harbor-srv-docker never went offline — reboot may not have started" >&2
            exit 1
          fi
          echo "Runner is offline. Waiting for it to come back..."

          echo "Phase 2: waiting for harbor-srv-docker to come back online..."
          elapsed=0
          while [ "$elapsed" -lt "$ONLINE_TIMEOUT" ]; do
            status=$(gh api "repos/${{ github.repository }}/actions/runners" \
              --jq '.runners[] | select(.name == "harbor-srv-docker") | .status')
            [ "$status" = "online" ] && break
            echo "  status=${status}, elapsed=${elapsed}s"
            sleep "$POLL"
            elapsed=$((elapsed + POLL))
          done
          if [ "$status" != "online" ]; then
            echo "ERROR: harbor-srv-docker did not come back online within ${ONLINE_TIMEOUT}s" >&2
            exit 1
          fi
          echo "Runner is back online — deploy succeeded."
