---
name: Promote Only

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "promote" to confirm.'
        required: true

permissions:
  contents: write
  actions: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm
        run: |
          if [ "${{ inputs.confirm }}" != "promote" ]; then
            echo "ERROR: type exactly 'promote' to confirm." >&2
            exit 1
          fi

      - name: Verify CI is green on staging
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/build.yml/runs?branch=staging&status=success&per_page=1" \
            --jq '.workflow_runs[0].id')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "ERROR: no successful CI build found on staging" >&2
            exit 1
          fi

      - name: Fast-forward main to staging
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api "repos/${{ github.repository }}/git/refs/heads/staging" \
            --jq '.object.sha')
          gh api "repos/${{ github.repository }}/git/refs/heads/main" \
            --method PATCH \
            --field sha="$SHA" \
            --field force=false

      - name: Trigger deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --repo ${{ github.repository }}
